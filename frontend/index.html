<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Quiz — Friendly Party Rental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg1: #0f172a;
        --bg2: #1e3a5f;
        --card: #ffffff;
        --text: #1a1a2e;
        --muted: #64748b;
        --gold: #d4af37;
        --gold-dark: #b8860b;
        --correct: #0d7a3e;
        --wrong: #b42318;
        --bar-bg: rgba(255, 255, 255, 0.2);
        --bar-fill: linear-gradient(90deg, #d4af37 0%, #f5e6a8 50%, #d4af37 100%);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, sans-serif;
        background: linear-gradient(145deg, var(--bg1) 0%, var(--bg2) 45%, #0c1929 100%);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      .app {
        max-width: 640px;
        margin: 0 auto;
        padding: 1.5rem 1rem 3rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 1.75rem 1.5rem 2rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .tagline {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 1.35rem;
      }
      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.4rem;
      }
      input[type="text"] {
        width: 100%;
        padding: 0.75rem 0.85rem;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        font: inherit;
        margin-bottom: 1.15rem;
        transition: border-color 0.15s;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--gold-dark);
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 0.85rem 1rem;
        font: inherit;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.12s, filter 0.12s, box-shadow 0.12s;
      }
      .btn-gold {
        background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dark) 100%);
        color: #1a1a2e;
        box-shadow: 0 4px 14px rgba(184, 134, 11, 0.45);
      }
      .btn-gold:hover:not(:disabled) {
        filter: brightness(1.06);
        transform: translateY(-1px);
      }
      .btn-gold:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .btn-outline {
        background: transparent;
        color: var(--muted);
        margin-top: 0.65rem;
        border: 2px solid #e2e8f0;
      }
      .top-bar {
        margin-bottom: 1rem;
      }
      .progress-wrap {
        height: 8px;
        background: var(--bar-bg);
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 0.65rem;
      }
      .progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: var(--bar-fill);
        background-size: 200% 100%;
        animation: shimmer 2s linear infinite;
        transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .stats-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.92);
        font-weight: 500;
      }
      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      .timer.low {
        color: #fca5a5;
      }
      .category {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--gold-dark);
        margin-bottom: 0.5rem;
      }
      .question-text {
        font-size: 1.05rem;
        font-weight: 600;
        line-height: 1.45;
        margin-bottom: 1.15rem;
      }
      .options {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }
      .opt {
        text-align: left;
        padding: 0.8rem 1rem;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        background: #fff;
        font: inherit;
        font-size: 0.92rem;
        cursor: pointer;
        transition: border-color 0.12s, background 0.12s, transform 0.1s;
      }
      .opt:hover:not(:disabled) {
        border-color: var(--gold-dark);
        background: #fffef5;
      }
      .opt:disabled {
        cursor: default;
      }
      .opt.correct {
        border-color: var(--correct);
        background: #ecfdf3;
      }
      .opt.wrong {
        border-color: var(--wrong);
        background: #fef2f2;
      }
      .opt.dim {
        opacity: 0.55;
      }
      .feedback {
        margin-top: 1rem;
        padding: 0.85rem 1rem;
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        display: none;
      }
      .feedback.show {
        display: block;
      }
      .feedback.ok {
        background: #ecfdf3;
        color: var(--correct);
      }
      .feedback.bad {
        background: #fef2f2;
        color: var(--wrong);
      }
      .next-wrap {
        margin-top: 1.1rem;
      }
      .results-hero {
        text-align: center;
        padding: 0.5rem 0 1rem;
      }
      .results-hero .big-score {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.1;
      }
      .results-hero .pct {
        font-size: 1.1rem;
        color: var(--muted);
        margin-top: 0.35rem;
      }
      .pass-badge,
      .fail-badge {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .pass-badge {
        background: #d1fae0;
        color: var(--correct);
      }
      .fail-badge {
        background: #fee4e2;
        color: var(--wrong);
      }
      .review {
        margin-top: 1.25rem;
        padding-top: 1.25rem;
        border-top: 1px solid #e2e8f0;
      }
      .review h3 {
        margin: 0 0 0.85rem;
        font-size: 0.95rem;
      }
      .review-item {
        font-size: 0.88rem;
        padding: 0.75rem 0;
        border-bottom: 1px solid #f1f5f9;
      }
      .review-item:last-child {
        border-bottom: none;
      }
      .review-q {
        font-weight: 600;
        margin-bottom: 0.35rem;
      }
      .review-meta {
        color: var(--muted);
        font-size: 0.82rem;
      }
      .save-status {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: var(--muted);
        text-align: center;
      }
      .save-status.err {
        color: var(--wrong);
      }
      .hidden {
        display: none !important;
      }
      .footnote {
        text-align: center;
        margin-top: 1.25rem;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.45);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div id="screen-intro" class="card">
        <h1>Friendly Party Rental</h1>
        <p class="tagline">Employee knowledge quiz — pricing &amp; inventory</p>
        <label for="emp-name">Your full name</label>
        <input
          id="emp-name"
          type="text"
          autocomplete="name"
          placeholder="Jane Doe"
        />
        <button type="button" class="btn btn-gold" id="btn-start">
          Start quiz
        </button>
        <p class="tagline" style="margin-top: 1rem; margin-bottom: 0">
          50 questions · multiple choice · 60:00 on the clock
        </p>
      </div>

      <div id="screen-quiz" class="hidden">
        <div class="top-bar">
          <div class="progress-wrap">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="stats-row">
            <span id="q-label">Question 1 / 50</span>
            <span class="timer" id="timer">60:00</span>
          </div>
        </div>
        <div class="card" id="quiz-card">
          <div class="category" id="q-category"></div>
          <div class="question-text" id="q-text"></div>
          <div class="options" id="q-options"></div>
          <div class="feedback" id="feedback"></div>
          <div class="next-wrap hidden" id="next-wrap">
            <button type="button" class="btn btn-gold" id="btn-next">
              Next question
            </button>
          </div>
        </div>
      </div>

      <div id="screen-results" class="hidden">
        <div class="card">
          <div class="results-hero">
            <div class="big-score" id="res-score">—</div>
            <div class="pct" id="res-pct"></div>
            <div id="res-badge"></div>
          </div>
          <p class="tagline" style="text-align: center; margin-bottom: 0" id="res-time"></p>
          <div class="review hidden" id="review-block">
            <h3>Review missed questions</h3>
            <div id="review-list"></div>
          </div>
          <p class="save-status" id="save-status"></p>
          <button type="button" class="btn btn-outline" id="btn-restart">
            Take quiz again
          </button>
        </div>
      </div>

      <p class="footnote">Friendly Party Rental · internal training</p>
    </div>

    <script>
      const Q = [
        {s:"Tables & Chairs",q:"What is the price of a single White Plastic Folding Chair?",o:["$2.00","$3.00","$2.50","$1.75"],a:2},
        {s:"Tables & Chairs",q:"What is the price of a single White Resin Folding Chair?",o:["$3.50","$4.75","$5.00","$4.25"],a:1},
        {s:"Tables & Chairs",q:"How much does it cost to rent a Cocktail Table?",o:["$15.00","$10.00","$14.00","$12.00"],a:3},
        {s:"Tables & Chairs",q:"What is the rental price of a 5ft Round Table?",o:["$13.00","$20.00","$15.00","$18.00"],a:2},
        {s:"Tables & Chairs",q:"The 6ft Plastic Folding Table rents for how much?",o:["$14.00","$15.00","$10.00","$13.00"],a:3},
        {s:"Tables & Chairs",q:"The 8ft Banquet Wood Folding Table costs how much to rent?",o:["$13.00","$12.00","$14.00","$16.00"],a:2},
        {s:"Tables & Chairs",q:"What is the rental price of a King Throne Chair?",o:["$100.00","$150.00","$125.00","$175.00"],a:2},
        {s:"Tables & Chairs",q:"The Queen Tiffany Throne Chair rents for how much?",o:["$100.00","$150.00","$125.00","$175.00"],a:2},
        {s:"Tables & Chairs",q:"The Folding Texas Hold'Em Table (Chips Included) rents for:",o:["$75.00","$100.00","$125.00","$85.00"],a:1},
        {s:"Tables & Chairs",q:"The 4ft Fill and Chill Table rents for:",o:["$30.00","$50.00","$45.00","$40.00"],a:3},
        {s:"Tents",q:"How much does a 20x20 Pole Tent rent for?",o:["$300.00","$325.00","$400.00","$250.00"],a:3},
        {s:"Tents",q:"What is the price of a 20x30 Pole Tent?",o:["$250.00","$400.00","$325.00","$375.00"],a:2},
        {s:"Tents",q:"How much does a 20x40 Pole Tent rent for?",o:["$350.00","$400.00","$450.00","$475.00"],a:1},
        {s:"Tents",q:"What is the price of a 20' x 20' Frame Tent?",o:["$325.00","$375.00","$400.00","$250.00"],a:2},
        {s:"Tents",q:"A 20' x 30' Frame Tent rents for:",o:["$400.00","$450.00","$475.00","$500.00"],a:2},
        {s:"Tents",q:"The 20' x 40' Frame Tent rents for:",o:["$500.00","$525.00","$575.00","$550.00"],a:2},
        {s:"Tents",q:"How much does a 10'x10' EZ Pop Up Canopy Tent rent for?",o:["$75.00","$100.00","$90.00","$125.00"],a:2},
        {s:"Tents",q:"A 10x20 EZ Pop Up Canopy Tent rents for:",o:["$150.00","$175.00","$200.00","$125.00"],a:1},
        {s:"Tents",q:"The 40x100 Pole Tent is priced at:",o:["$1,750.00","$1,850.00","$2,000.00","$1,950.00"],a:3},
        {s:"Tents",q:"A customer wants a 30x45 Pole Tent. What do you quote them?",o:["$575.00","$650.00","$700.00","$750.00"],a:2},
        {s:"Tents",q:"The 40x80 Pole Tent rents for:",o:["$1,550.00","$1,650.00","$1,750.00","$1,800.00"],a:2},
        {s:"Tents",q:"What does a 20' Side Wall (Tent Not Included) cost?",o:["$50.00","$30.00","$40.00","$35.00"],a:2},
        {s:"Tents",q:"A customer asks about a Glamping Tent. What is the price?",o:["$200.00","$225.00","$300.00","$250.00"],a:3},
        {s:"Tents",q:"The 30x40 Classic Frame Tent rents for:",o:["$800.00","$849.99","$875.00","$900.00"],a:1},
        {s:"Tents",q:"The 30x30 Pole Tent rents for:",o:["$500.00","$550.00","$575.00","$600.00"],a:2},
        {s:"Dance-Floor / Add-Ons",q:"A Dance Floor 3x3 Section rents for:",o:["$25.00","$40.00","$30.00","$35.00"],a:3},
        {s:"Dance-Floor / Add-Ons",q:"The 550w Bluetooth Speaker rents for:",o:["$50.00","$100.00","$75.00","$60.00"],a:2},
        {s:"Dance-Floor / Add-Ons",q:"A Red Carpet (25'L x 4'W) rents for:",o:["$75.00","$100.00","$80.00","$60.00"],a:2},
        {s:"Dance-Floor / Add-Ons",q:"The Audio Guest Book rents for:",o:["$200.00","$225.00","$250.00","$275.00"],a:2},
        {s:"Dance-Floor / Add-Ons",q:"A 36\" Crowd Control / Guidance Stanchion rents for:",o:["$10.00","$5.00","$8.00","$12.00"],a:2},
        {s:"Heating & Cooling",q:"A 170K Tent Heater rents for:",o:["$150.00","$175.00","$200.00","$125.00"],a:1},
        {s:"Heating & Cooling",q:"An 80K Tent Heater rents for:",o:["$100.00","$150.00","$125.00","$175.00"],a:2},
        {s:"Heating & Cooling",q:"A 100 Lbs Propane Tank rents for:",o:["$100.00","$150.00","$125.00","$75.00"],a:2},
        {s:"Heating & Cooling",q:"A 20 lb. Propane Tank rents for:",o:["$20.00","$25.00","$30.00","$35.00"],a:1},
        {s:"Linens",q:"How much does a Black Spandex 8ft Table Linen cost?",o:["$15.00","$25.00","$20.00","$18.00"],a:2},
        {s:"Linens",q:"A Plastic Linen Clip costs:",o:["$1.00","$0.75","$0.25","$0.50"],a:3},
        {s:"Linens",q:"Chair Covers (Spandex, black or white) cost how much each?",o:["$3.00","$1.00","$2.50","$2.00"],a:3},
        {s:"Linens",q:"The Spandex Cocktail Table Linen rents for:",o:["$15.00","$10.00","$18.00","$12.00"],a:3},
        {s:"Beverage & Food Service",q:"Dinner Plates (10 5/8\") — how many per rack and what is the price?",o:["20 per rack / $30.00","24 per rack / $40.00","24 per rack / $30.00","15 per rack / $25.00"],a:1},
        {s:"Beverage & Food Service",q:"A 60oz. Beverage Pitcher rents for:",o:["$10.00","$5.00","$7.00","$8.00"],a:2},
        {s:"Beverage & Food Service",q:"A Chafer (8 Quart Full Size) rents for:",o:["$35.00","$45.00","$40.00","$50.00"],a:2},
        {s:"Beverage & Food Service",q:"The Coffee Urn / Percolator 100 Cup (500 oz.) rents for:",o:["$40.00","$25.00","$35.00","$30.00"],a:3},
        {s:"Beverage & Food Service",q:"Dinner Forks (20 Per Bag) rent for:",o:["$15.00","$25.00","$20.00","$30.00"],a:2},
        {s:"Concessions",q:"The Snow Cone Machine rents for:",o:["$100.00","$115.00","$125.00","$150.00"],a:2},
        {s:"Concessions",q:"The Cotton Candy Machine / Floss Maker rents for:",o:["$75.00","$125.00","$100.00","$150.00"],a:2},
        {s:"Concessions",q:"A bottle of Snow Cone Syrup (any flavor) costs:",o:["$5.00","$15.00","$10.00","$8.00"],a:2},
        {s:"Photobooth & Special",q:"The Photobooth No-Attendant 6-Hour Rental is priced at:",o:["$500.00","$550.00","$600.00","$650.00"],a:2},
        {s:"Photobooth & Special",q:"The Foam Machine 4-Hour Rental is priced at:",o:["$400.00","$450.00","$475.00","$500.00"],a:3},
        {s:"Bounce Houses",q:"The Fire Truck Water Slide Bounce House rents for:",o:["$300.00","$325.00","$350.00","$375.00"],a:3},
        {s:"Generator & Packages",q:"The 4375-Watt Generator rents for:",o:["$125.00","$150.00","$175.00","$200.00"],a:1}
      ];

      const TOTAL_SECONDS = 60 * 60;
      const PASS_PERCENT = 80;

      const $ = (id) => document.getElementById(id);

      const screenIntro = $("screen-intro");
      const screenQuiz = $("screen-quiz");
      const screenResults = $("screen-results");
      const empName = $("emp-name");
      const btnStart = $("btn-start");
      const progressFill = $("progress-fill");
      const qLabel = $("q-label");
      const timerEl = $("timer");
      const qCategory = $("q-category");
      const qText = $("q-text");
      const qOptions = $("q-options");
      const feedback = $("feedback");
      const nextWrap = $("next-wrap");
      const btnNext = $("btn-next");
      const resScore = $("res-score");
      const resPct = $("res-pct");
      const resBadge = $("res-badge");
      const resTime = $("res-time");
      const reviewBlock = $("review-block");
      const reviewList = $("review-list");
      const saveStatus = $("save-status");
      const btnRestart = $("btn-restart");

      let idx = 0;
      let score = 0;
      const answers = [];
      const missed = [];
      let timerId = null;
      let secondsLeft = TOTAL_SECONDS;

      function formatClock(secs) {
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        return m + ":" + String(s).padStart(2, "0");
      }

      function timeTakenLabel() {
        const elapsed = Math.max(0, TOTAL_SECONDS - secondsLeft);
        return formatClock(elapsed);
      }

      function updateTimerDisplay() {
        timerEl.textContent = formatClock(secondsLeft);
        if (secondsLeft <= 300) timerEl.classList.add("low");
        else timerEl.classList.remove("low");
      }

      function finishQuizOutOfTime() {
        clearInterval(timerId);
        timerId = null;
        if (nextWrap.classList.contains("hidden")) {
          const item = Q[idx];
          missed.push({
            question: item.q,
            yourAnswer: "(no answer)",
            correctAnswer: item.o[item.a],
          });
        }
        idx++;
        while (idx < Q.length) {
          const item = Q[idx];
          missed.push({
            question: item.q,
            yourAnswer: "(no answer)",
            correctAnswer: item.o[item.a],
          });
          idx++;
        }
        showResults();
      }

      function tickTimer() {
        secondsLeft--;
        if (secondsLeft <= 0) {
          secondsLeft = 0;
          updateTimerDisplay();
          finishQuizOutOfTime();
          return;
        }
        updateTimerDisplay();
      }

      function setProgress() {
        const pct = ((idx + 1) / Q.length) * 100;
        progressFill.style.width = pct + "%";
        qLabel.textContent = "Question " + (idx + 1) + " / " + Q.length;
      }

      function showQuestion() {
        setProgress();
        const item = Q[idx];
        qCategory.textContent = item.s;
        qText.textContent = item.q;
        qOptions.innerHTML = "";
        feedback.className = "feedback";
        feedback.textContent = "";
        nextWrap.classList.add("hidden");

        item.o.forEach((label, i) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "opt";
          b.textContent = label;
          b.addEventListener("click", () => choose(i, b));
          qOptions.appendChild(b);
        });
      }

      function choose(choiceIndex, btnEl) {
        const item = Q[idx];
        const buttons = qOptions.querySelectorAll(".opt");
        buttons.forEach((b) => (b.disabled = true));

        const correctIndex = item.a;
        const isCorrect = choiceIndex === correctIndex;
        if (isCorrect) score++;

        answers.push({
          choiceIndex,
          correct: isCorrect,
        });

        if (!isCorrect) {
          missed.push({
            question: item.q,
            yourAnswer: item.o[choiceIndex],
            correctAnswer: item.o[correctIndex],
          });
        }

        buttons.forEach((b, i) => {
          if (i === correctIndex) b.classList.add("correct");
          else if (i === choiceIndex) b.classList.add("wrong");
          else b.classList.add("dim");
        });

        feedback.classList.add("show");
        if (isCorrect) {
          feedback.classList.add("ok");
          feedback.textContent = "Correct — nice work.";
        } else {
          feedback.classList.add("bad");
          feedback.textContent =
            "Not quite. The correct answer is: " + item.o[correctIndex];
        }

        nextWrap.classList.remove("hidden");
        if (idx === Q.length - 1) {
          btnNext.textContent = "See results";
        } else {
          btnNext.textContent = "Next question";
        }
      }

      function showResults() {
        screenQuiz.classList.add("hidden");
        screenResults.classList.remove("hidden");

        const total = Q.length;
        const percent = Math.round((score / total) * 100);
        const passed = percent >= PASS_PERCENT;

        resScore.textContent = score + " / " + total;
        resPct.textContent = percent + "% correct";
        resTime.textContent =
          "Time taken: " + timeTakenLabel() + " · Pass at " + PASS_PERCENT + "%";

        if (passed) {
          resBadge.innerHTML =
            '<span class="pass-badge">Pass</span>';
        } else {
          resBadge.innerHTML =
            '<span class="fail-badge">Did not pass</span>';
        }

        if (missed.length) {
          reviewBlock.classList.remove("hidden");
          reviewList.innerHTML = "";
          missed.forEach((m) => {
            const d = document.createElement("div");
            d.className = "review-item";
            d.innerHTML =
              '<div class="review-q"></div><div class="review-meta"></div>';
            d.querySelector(".review-q").textContent = m.question;
            d.querySelector(".review-meta").textContent =
              "Your answer: " +
              m.yourAnswer +
              " · Correct: " +
              m.correctAnswer;
            reviewList.appendChild(d);
          });
        } else {
          reviewBlock.classList.add("hidden");
        }

        submitResults({
          name: empName.value.trim(),
          score,
          total,
          percent,
          timeTaken: timeTakenLabel(),
          passed,
          missedQuestions: missed,
        });
      }

      async function submitResults(payload) {
        saveStatus.textContent = "Saving results…";
        saveStatus.classList.remove("err");
        try {
          const res = await fetch("/api/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: payload.name,
              score: payload.score,
              total: payload.total,
              percent: payload.percent,
              timeTaken: payload.timeTaken,
              passed: payload.passed,
              missedQuestions: payload.missedQuestions,
            }),
          });
          if (!res.ok) throw new Error("Save failed");
          saveStatus.textContent = "Results saved. Thank you.";
        } catch (e) {
          saveStatus.textContent =
            "Could not save results. Your score is still shown above.";
          saveStatus.classList.add("err");
        }
      }

      btnStart.addEventListener("click", () => {
        if (!empName.value.trim()) {
          empName.focus();
          return;
        }
        idx = 0;
        score = 0;
        missed.length = 0;
        answers.length = 0;
        secondsLeft = TOTAL_SECONDS;
        screenIntro.classList.add("hidden");
        screenQuiz.classList.remove("hidden");
        screenResults.classList.add("hidden");
        updateTimerDisplay();
        if (timerId) clearInterval(timerId);
        timerId = setInterval(tickTimer, 1000);
        showQuestion();
      });

      btnNext.addEventListener("click", () => {
        idx++;
        if (idx >= Q.length) {
          clearInterval(timerId);
          timerId = null;
          showResults();
        } else {
          showQuestion();
        }
      });

      btnRestart.addEventListener("click", () => {
        screenResults.classList.add("hidden");
        screenIntro.classList.remove("hidden");
        saveStatus.textContent = "";
        saveStatus.classList.remove("err");
        empName.value = "";
      });
    </script>
  </body>
</html>
