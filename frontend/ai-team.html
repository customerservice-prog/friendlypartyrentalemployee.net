<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>AI Assistant Team — Friendly Party Rental</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/train.css" />
    <style>
      body { margin:0; min-height:100vh; font-family:"Inter",system-ui,sans-serif; background:linear-gradient(145deg,#0f172a 0%,#1e3a5f 45%,#0c1929 100%); }
      .team-wrap { max-width:1100px; margin:0 auto; padding:2.5rem 1.25rem 4rem; }
      .team-title { color:#f5e6a8; font-size:2rem; font-weight:800; margin-bottom:0.4rem; }
      .team-sub { color:rgba(245,230,168,0.7); font-size:1rem; margin-bottom:2.5rem; }
      .team-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5rem; }
      .agent-card { background:rgba(255,255,255,0.97); border-radius:16px; padding:1.75rem; cursor:pointer; border:none; text-align:left; font-family:inherit; width:100%; transition:transform 0.18s,box-shadow 0.18s; box-shadow:0 4px 24px rgba(0,0,0,0.18); }
      .agent-card:hover { transform:translateY(-4px); box-shadow:0 12px 40px rgba(0,0,0,0.28); }
      .agent-avatar { font-size:2.5rem; margin-bottom:0.75rem; }
      .agent-name { font-size:1.15rem; font-weight:700; color:#1a1a2e; margin-bottom:0.25rem; }
      .agent-role { font-size:0.82rem; font-weight:600; color:#b8860b; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.75rem; }
      .agent-desc { font-size:0.9rem; color:#5c5c6f; line-height:1.55; margin-bottom:1rem; }
      .agent-tags { display:flex; flex-wrap:wrap; gap:0.4rem; }
      .tag { background:#f0f0f0; color:#444; font-size:0.75rem; padding:0.2rem 0.6rem; border-radius:999px; }
      .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
      .modal-overlay.open { display:flex; }
      .modal-box { background:#fff; border-radius:20px; width:min(560px,94vw); max-height:85vh; display:flex; flex-direction:column; box-shadow:0 24px 80px rgba(0,0,0,0.45); overflow:hidden; }
      .modal-header { background:linear-gradient(135deg,#1e3a5f,#0f172a); color:#f5e6a8; padding:1rem 1.25rem; display:flex; align-items:center; justify-content:space-between; }
      .modal-title { font-weight:700; font-size:1rem; }
      .modal-close { background:none; border:none; color:#f5e6a8; font-size:1.4rem; cursor:pointer; padding:0.2rem 0.5rem; }
      .modal-msgs { flex:1; overflow-y:auto; padding:1.25rem; display:flex; flex-direction:column; gap:0.75rem; min-height:200px; max-height:350px; }
      .chat-bubble { max-width:85%; padding:0.75rem 1rem; border-radius:14px; font-size:0.9rem; line-height:1.55; }
      .chat-bubble.user { background:#1e3a5f; color:#fff; align-self:flex-end; border-bottom-right-radius:4px; margin-left:auto; }
      .chat-bubble.assistant { background:#f8f9fa; color:#1a1a2e; align-self:flex-start; border-bottom-left-radius:4px; }
      .chat-bubble.system { background:#fff8e7; color:#8a6200; align-self:center; font-size:0.82rem; border-radius:8px; border:1px solid #f5d87a; text-align:center; }
      .chat-bubble strong { font-weight:700; }
      .quick-btns { padding:0.5rem 1rem; border-top:1px solid #f0f0f0; display:flex; flex-wrap:wrap; gap:0.4rem; }
      .quick-btn { background:#f0f0f0; border:none; border-radius:999px; padding:0.3rem 0.8rem; font-size:0.78rem; cursor:pointer; color:#444; font-family:inherit; }
      .quick-btn:hover { background:#e0e0e0; }
      .modal-form { padding:0.75rem 1rem; border-top:1px solid #eee; display:flex; gap:0.5rem; }
      .modal-input { flex:1; border:1.5px solid #ddd; border-radius:10px; padding:0.6rem 0.8rem; font:inherit; font-size:0.9rem; outline:none; resize:none; }
      .modal-input:focus { border-color:#b8860b; }
      .modal-send { background:linear-gradient(135deg,#d4af37,#b8860b); color:white; border:none; border-radius:10px; padding:0.6rem 1.1rem; cursor:pointer; font-weight:600; font-family:inherit; }
    </style>
  </head>
  <body>
    <header class="train-topnav">
      <a class="train-brand" href="/"><img src="/assets/quiz-logo.png" alt="" width="40" height="40" class="train-brand-logo" /><span>Training hub</span></a>
      <nav class="train-nav-links">
        <a href="/">Home</a>
        <a href="/quizzes">Quizzes</a>
        <a href="/assistant">AI assistant</a>
        <a href="/ai-team" aria-current="page">AI Team</a>
        <a href="/admin.html" class="train-nav-admin">Quiz results</a>
        <button type="button" class="train-signout" id="train-signout">Sign out</button>
      </nav>
    </header>

    <div class="team-wrap">
      <h1 class="team-title">🤖 AI Assistant Team</h1>
      <p class="team-sub">Click any specialist to chat — each focuses on a different part of the business, using the same training information we use on the job.</p>
      <div class="team-grid" id="agent-grid"></div>
    </div>

    <div class="modal-overlay" id="chat-modal">
      <div class="modal-box">
        <div class="modal-header">
          <span class="modal-title" id="modal-title">AI Specialist</span>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-msgs" id="modal-msgs"></div>
        <div class="quick-btns" id="quick-btns"></div>
        <form class="modal-form" id="modal-form">
          <textarea class="modal-input" id="modal-input" rows="1" placeholder="Ask a question..."></textarea>
          <button type="submit" class="modal-send">Send</button>
        </form>
      </div>
    </div>

    <script src="/js/fpr-ai-bootstrap.js"></script>
    <script>
    (function() {
      var AGENTS = [
        {avatar:'💰',name:'Pricing Pro',role:'Pricing & Quotes Specialist',desc:'Expert on all rental pricing, packages, discounts, and building accurate customer quotes.',topics:['Table pricing','Tent costs','Package deals','SAVE20 discount','Quote scripts'],quick:['How do I give a tent quote?','What package deals do we offer?','How do I use the SAVE20 code?']},
        {avatar:'⛺',name:'Rentals Expert',role:'Inventory & Products Specialist',desc:'Knows every rental item — from bounce houses to generators. Ask about any product.',topics:['Tents','Tables & Chairs','Bounce Houses','Concessions','All rentals'],quick:['What tent sizes do we have?','What bounce houses are available?','What concession machines do we rent?']},
        {avatar:'📞',name:'Call Coach',role:'Customer Service Scripts',desc:'Ready-to-use scripts and sample wording for customer calls, complaints, and FAQs.',topics:['Call greetings','Quote scripts','Complaint handling','FAQ responses','Closing phrases'],quick:['What do I say when a customer asks about pricing?','How do I handle a complaint?','What is the booking script?']},
        {avatar:'🚚',name:'Delivery Guide',role:'Delivery & Logistics Expert',desc:'Covers delivery, setup, pickup, service areas, same-day service, and logistics.',topics:['Delivery process','Setup & pickup','Service area','Same-day service','Weekend delivery'],quick:['How does delivery work?','Do we do same-day delivery?','What areas do we serve?']},
        {avatar:'🎉',name:'Event Planner',role:'Event Planning Advisor',desc:'Helps plan rentals for weddings, birthdays, corporate events, and any celebration.',topics:['Weddings','Birthday parties','Corporate events','Graduations','Outdoor events'],quick:['What do we need for a wedding?','Best rentals for a birthday party?','What about outdoor corporate events?']},
        {avatar:'📋',name:'Policy Guide',role:'Policies & Procedures Expert',desc:'Answers questions about booking policies, cancellations, deposits, safety, and company procedures.',topics:['Booking process','Cancellations','Deposits','Safety standards','Contact info'],quick:['What is the cancellation policy?','How much is the deposit?','What are safety rules for bounce houses?']},
      ];

      function escHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      var grid = document.getElementById('agent-grid');
      var modal = document.getElementById('chat-modal');
      var modalTitle = document.getElementById('modal-title');
      var modalMsgs = document.getElementById('modal-msgs');
      var modalForm = document.getElementById('modal-form');
      var modalInput = document.getElementById('modal-input');
      var quickBtns = document.getElementById('quick-btns');
      var modalChatHistory = [];

      AGENTS.forEach(function(agent) {
        var btn = document.createElement('button');
        btn.className = 'agent-card';
        btn.innerHTML = '<div class="agent-avatar">' + agent.avatar + '</div>' +
          '<div class="agent-name">' + agent.name + '</div>' +
          '<div class="agent-role">' + agent.role + '</div>' +
          '<div class="agent-desc">' + agent.desc + '</div>' +
          '<div class="agent-tags">' + agent.topics.map(function(t){return '<span class="tag">'+t+'</span>';}).join('') + '</div>';
        btn.addEventListener('click', function() { openAgent(agent); });
        grid.appendChild(btn);
      });

      function addMsg(role, text) {
        var d = document.createElement('div');
        d.className = 'chat-bubble ' + role;
        var raw = String(text);
        if (role === 'user') {
          d.textContent = raw;
        } else {
          d.innerHTML = raw
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
        }
        modalMsgs.appendChild(d);
        modalMsgs.scrollTop = modalMsgs.scrollHeight;
      }

      function openAgent(agent) {
        modalTitle.textContent = agent.avatar + ' ' + agent.name + ' — ' + agent.role;
        modalMsgs.innerHTML = '';
        modalChatHistory = [];
        quickBtns.innerHTML = agent.quick.map(function(q) {
          return '<button class="quick-btn" type="button">' + escHtml(q) + '</button>';
        }).join('');
        quickBtns.querySelectorAll('.quick-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
            modalInput.value = btn.textContent;
            modalForm.dispatchEvent(new Event('submit'));
          });
        });
        addMsg('system', 'Hi! I am ' + agent.name + ', your ' + agent.role + '. I am trained on all Friendly Party Rental information. Ask me anything!');
        modal.classList.add('open');
        setTimeout(function() { modalInput.focus(); }, 100);
      }

      modalForm.addEventListener('submit', function(e) {
        e.preventDefault();
        var text = modalInput.value.trim();
        if (!text) return;
        modalInput.value = '';
        modalInput.style.height = 'auto';
        addMsg('user', text);
        modalChatHistory.push({ role: 'user', content: text });
        fetch('/api/employee/me', { credentials: 'same-origin' })
          .then(function(r) { return r.json().catch(function() { return {}; }); })
          .then(function(me) {
            if (me.assistantPausedForQuiz) {
              addMsg('assistant', me.quizAssistantMessage || 'The training assistant is paused while you have a quiz in progress. Finish or leave the quiz, then try again.');
              return;
            }
            var loadFaq = window.FPR_PRICING_FAQ_LOAD ? window.FPR_PRICING_FAQ_LOAD() : Promise.resolve();
            return loadFaq.then(function() {
              function finishLocal() {
                var lo = window.FPR_LOCAL_AI ? window.FPR_LOCAL_AI(text) : 'AI loading...';
                addMsg('assistant', lo);
                modalChatHistory.push({ role: 'assistant', content: lo });
              }
              var kbHit = window.FPR_TRY_KNOWLEDGE_LOOKUP && window.FPR_TRY_KNOWLEDGE_LOOKUP(text);
              if (kbHit) {
                addMsg('assistant', kbHit);
                modalChatHistory.push({ role: 'assistant', content: kbHit });
                return;
              }
              if (me.assistantUsesOpenAI && window.FPR_ASSISTANT_REPLY) {
                return window.FPR_ASSISTANT_REPLY(modalChatHistory).then(function(api) {
                  if (!api.ok && api.status === 403 && api.message) {
                    addMsg('assistant', api.message);
                    return;
                  }
                  var usedCloud = api.ok && api.content;
                  var response = usedCloud
                    ? api.content
                    : (window.FPR_LOCAL_AI ? window.FPR_LOCAL_AI(text) : 'AI loading...');
                  if (!usedCloud && (!api.ok || api.error === 'timeout')) {
                    var note = '*Live AI did not return an answer in time — showing the **offline training library** instead.*\n\n';
                    if (api.message && api.status === 502) {
                      note = '*' + api.message + '*\n\n';
                    }
                    response = note + response;
                  }
                  addMsg('assistant', response);
                  modalChatHistory.push({ role: 'assistant', content: response });
                });
              }
              finishLocal();
            });
          })
          .catch(function() {
            addMsg('assistant', 'Could not reach the server. Try again.');
          });
      });

      document.getElementById('modal-close').addEventListener('click', function() { modal.classList.remove('open'); });
      modal.addEventListener('click', function(e) { if (e.target === modal) modal.classList.remove('open'); });
      modalInput.addEventListener('input', function() { this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px'; });
      modalInput.addEventListener('keydown', function(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();modalForm.dispatchEvent(new Event('submit'));} });

      // Auth check
      fetch('/api/employee/me', {credentials:'same-origin'}).then(function(r){return r.json().catch(function(){return {};});}).then(function(d){
        if (!d.employeeAuthenticated) window.location.href = '/welcome.html?return=' + encodeURIComponent(window.location.pathname + window.location.search);
        else if (window.FPR_PRICING_FAQ_LOAD) window.FPR_PRICING_FAQ_LOAD().catch(function(){});
      }).catch(function(){});

      document.getElementById('train-signout').addEventListener('click', async function() {
        try {
          await fetch('/api/employee/logout', {method:'POST', credentials:'same-origin'});
        } catch (_) {}
        window.location.href = '/';
      });
    })();
    </script>
  </body>
</html>
