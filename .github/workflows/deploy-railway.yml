# Deploys this repo to Railway using the official CLI Docker image (no npm PATH issues).
#
# Required — use ONE of these GitHub Actions secrets:
#   RAILWAY_TOKEN
#     Preferred: Railway → open the PROJECT → Settings → Tokens → New Project Token
#   RAILWAY_API_TOKEN
#     Fallback: Railway → Account / Workspace → API Tokens (some teams only create this)
#
# Optional (if Railway says project or service is ambiguous):
#   RAILWAY_PROJECT_ID  — Project → Settings → General → Project ID
#   RAILWAY_SERVICE     — Service name from the canvas (or service ID)
#
# If deploys still fail, open the workflow log for this step and read the Railway error text.
# You can also disable this workflow and use Railway → Service → Settings → Connect GitHub.

name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway (official CLI image)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
        run: |
          set -eo pipefail

          # Project token is standard; account/workspace token works for many projects too.
          if [ -z "${RAILWAY_TOKEN:-}" ] && [ -n "${RAILWAY_API_TOKEN:-}" ]; then
            export RAILWAY_TOKEN="$RAILWAY_API_TOKEN"
          fi

          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::error::Add secret RAILWAY_TOKEN (project token) or RAILWAY_API_TOKEN."
            echo "Project token: Railway → your project → Settings → Tokens."
            exit 1
          fi

          docker pull ghcr.io/railwayapp/cli:latest

          MSG="gh-${GITHUB_SHA}"
          EXTRA=(up --detach --ci -m "${MSG}")

          if [ -n "${RAILWAY_PROJECT_ID:-}" ]; then
            EXTRA+=(--project "${RAILWAY_PROJECT_ID}")
          fi
          if [ -n "${RAILWAY_SERVICE:-}" ]; then
            EXTRA+=(--service "${RAILWAY_SERVICE}")
          fi

          echo "Running: railway ${EXTRA[*]}"
          docker run --rm \
            --entrypoint /usr/bin/railway \
            -e RAILWAY_TOKEN \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            ghcr.io/railwayapp/cli:latest \
            "${EXTRA[@]}"
